name: 素材投稿
description: 提交新的表情包素材建议
title: "[素材投稿]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您的投稿！请填写以下信息。
  - type: textarea
    id: source
    attributes:
      label: 素材来源及内容说明
      description: 图片出处、角色、表达的含义等
      placeholder: 例如：来自《鸣潮》角色菲比，体现自我约束但内心真挚
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: 希望制作的表情包效果
      description: 您期望的表情包形式或文字
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 补充说明（可选）
      description: 是否检查过已有同类素材，或其他想法
    validations:
      required: false
  - type: checkboxes
    attributes:
      label: 参与贡献
      options:
        - label: 我愿意参与制作并提交代码/素材
          required: false